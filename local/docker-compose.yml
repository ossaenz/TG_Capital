services:
  tg-local:
    build:
      context: ..          # project root — so Dockerfile can COPY app files
      dockerfile: local/Dockerfile
    container_name: tg-capital-local
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs      # SSL cert persisted across restarts
      - ./data:/app/data        # tokens, account hash, CSV, sync state
